<ion-header x-data="home">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title x-text="$t('home.title')"></ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <div class="home-container">
    <div class="home-header">
      <h1>Welcome, <span x-text="username"></span></h1>
      <p x-text="$t('home.description')"></p>
      <p style="margin-top: 4px; font-size: 0.85em; color: var(--ion-color-medium);">Developed by ARJUN M</p>
    </div>

    <div class="category-grid">
      <template x-for="(category, idx) in categories" :key="category.name">
        <a class="category-card" x-bind:href="'list/' + idx + '/0'" data-navigo>
          <div class="category-icons">
            <template x-for="iconUrl in category.iconUrls">
              <img x-bind:src="iconUrl" width="40" height="40" class="thumbnail aura"
                x-bind:alt="category.name" />
            </template>
          </div>
          <span x-text="$t('category.' + category.name)"></span>
        </a>
      </template>
    </div>

  </div>
</ion-content>
